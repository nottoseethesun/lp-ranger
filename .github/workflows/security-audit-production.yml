name: Security Audit (Latest Release)

on:
  schedule:
    - cron: "55 11 * * *"
  workflow_dispatch:

jobs:
  dependency-audit-latest-release:
    name: Dependency Audit (Latest Release)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve latest published release tag
        id: latest
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases/latest" -q .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest published release: $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.latest.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run audit:deps
