# .github/workflows/ci.yml
#
# Continuous Integration pipeline for the 9mm v3 Position Manager.
#
# Single job
# ──────────
# A single `check` job per Node version runs `npm run check`, which handles
# lint (JS + CSS + HTML + Markdown) → tests + coverage → security audits
# (npm audit + security-lint + secretlint) in one pass and writes a full
# set of report artifacts under `test/report-artifacts/` (summary.txt,
# summary.md, tests-summary.txt, tests.tap, report.pdf, raw-data/*.json).
#
# After the check runs:
#   1. text-reports/summary.md is appended to $GITHUB_STEP_SUMMARY so the
#      overall PASS/FAIL rollup, per-check detail, slowest tests, and
#      security summary render inline on every workflow run page — no
#      clicks required to see what happened.
#   2. The entire test/report-artifacts/ directory (including the PDF and
#      all raw JSON outputs) is uploaded as a workflow artifact, retained
#      for 30 days. Download it from the run page "Artifacts" section to
#      open the PDF or dig into any tool's raw output.
#
# A lint failure no longer aborts the job before tests run — `npm run check`
# always executes every tool and reports on all of them together, so the
# artifact always contains complete data even when something is red.
#
# Triggers
# ────────
# • Every push to main or develop
# • Every pull request targeting main or develop
# • Manual dispatch from the Actions tab (workflow_dispatch)

name: CI
run-name: CI on ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:

  check:
    name: Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      # Run every matrix version even if one fails, so we see the full picture.
      fail-fast: false
      matrix:
        # Node 22 = current LTS, Node 24 = latest stable.
        node-version: ['22', '24']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm run check (lint + tests + coverage + security audits)
        # `npm run check` writes its full output to test/report-artifacts/
        # and exits non-zero iff any individual check failed. The 80% line
        # coverage threshold is enforced inside the aggregator.
        run: npm run check

      - name: Publish markdown summary to workflow run page
        # Append text-reports/summary.md to $GITHUB_STEP_SUMMARY so the
        # rollup renders inline on the run page. `if: always()` ensures
        # the summary is published even when the check step fails, so
        # reviewers can still see which check was red at a glance.
        if: always()
        run: |
          if [ -f test/report-artifacts/text-reports/summary.md ]; then
            cat test/report-artifacts/text-reports/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ summary.md was not generated" >> "$GITHUB_STEP_SUMMARY"
            echo "The check step failed before the aggregator could run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload check report artifact
        # Upload even on failure so reviewers can download the PDF + raw
        # JSON to investigate what broke. One artifact per Node version.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-report-node-${{ matrix.node-version }}
          path: test/report-artifacts/
          retention-days: 30
          if-no-files-found: warn
