# .github/workflows/ci.yml
#
# Continuous Integration pipeline for the 9mm v3 Position Manager.
#
# Job order
# ─────────
# 1. lint   — ESLint must pass cleanly before any tests are attempted.
#             A lint failure aborts the run immediately, saving runner minutes
#             and giving reviewers a clear signal that the code needs cleanup
#             before test results are meaningful.
#
# 2. test   — Runs only when the lint job succeeds (needs: lint).
#             Uses Node.js's built-in test runner (node --test) with coverage.
#
# This ordering means every PR check list shows "lint" as the first required
# status and "test" as the second.  A PR cannot be merged until both pass.
#
# Triggers
# ────────
# • Every push to main or develop
# • Every pull request targeting main or develop
# • Manual dispatch from the Actions tab (workflow_dispatch)

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        # --max-warnings 0 means any ESLint warning is also treated as a failure.
        # The config only emits warnings for no-console in src files; keeping
        # the bar high ensures warnings don't accumulate unnoticed.
        run: npm run lint

  # ── Job 2: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    # This job will not start until the lint job completes successfully.
    # If lint fails, this job is skipped entirely.
    needs: lint

    strategy:
      # Run all matrix versions even if one fails, so we see the full picture.
      fail-fast: false
      matrix:
        # Test on the minimum supported version and the current LTS/latest.
        # Node 18 = minimum (node:test built-in available).
        # Node 22 = current latest as of writing.
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage and enforce 80% minimum
        # Coverage reporting requires Node 20+ (--experimental-test-coverage).
        # On Node 22, enforce 80% line coverage — fail the job if below.
        if: matrix.node-version != '18'
        run: |
          output=$(npm run test:coverage 2>&1)
          echo "$output"
          if [ "${{ matrix.node-version }}" = "22" ]; then
            coverage=$(echo "$output" | grep 'all files' | sed 's/[^0-9.]/ /g' | awk '{print $1}')
            echo "Line coverage: ${coverage}%"
            cov_int=${coverage%.*}
            if [ "$cov_int" -lt 80 ]; then
              echo "::error::Coverage ${coverage}% is below the 80% minimum"
              exit 1
            fi
          fi

      - name: Upload coverage report
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
        continue-on-error: true
