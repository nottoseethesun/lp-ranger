# Release workflow — creates a release branch with pinned dependencies.
#
# Trigger manually via Actions → "Create Release" → Run workflow.
# Provide a semantic version (e.g. 2.1.0). The workflow will:
#   1. Verify main passes lint + test
#   2. Create a release-x.y.z branch with pinned deps + built bundle
#   3. Tag and publish a GitHub Release from that branch
#
# The main branch is never modified.

name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Lint + test
        run: npm run check

      - name: Create release branch
        run: git checkout -b "release-${{ inputs.version }}"

      - name: Pin dependency versions
        run: |
          node <<'PINSCRIPT'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          function pinSection(section) {
            if (!section) return;
            for (const name of Object.keys(section)) {
              const resolved = lock.packages['node_modules/' + name];
              if (resolved && resolved.version) section[name] = resolved.version;
              else section[name] = section[name].replace(/^[\^~]/, '');
            }
          }
          pinSection(pkg.dependencies);
          pinSection(pkg.devDependencies);
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Pinned all dependency versions in package.json');
          PINSCRIPT

      - name: Add .npmrc (save-exact)
        run: echo 'save-exact=true' > .npmrc

      - name: Regenerate lockfile from pinned versions
        run: npm install --package-lock-only --ignore-scripts

      - name: Build bundle
        run: npm run build

      - name: Update package.json version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Commit release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f package.json package-lock.json .npmrc public/dist/bundle.js public/index.html
          git commit -m "release: v${{ inputs.version }} — pinned deps + built bundle"

      - name: Push release branch + tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "release-${{ inputs.version }}" "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          generate_release_notes: true
          target_commitish: "release-${{ inputs.version }}"
