# Release artifact builder.
#
# Triggers automatically whenever a GitHub Release is published (via the
# Actions UI, `gh release create`, API, or the repository web UI).  Builds
# the dashboard bundle at the release's tagged commit, packages a
# production-ready tarball, and uploads it as a release asset.
#
# Production install becomes:
#   tar xzf lp-ranger-<version>.tar.gz
#   cd lp-ranger-<version>
#   npm ci
#   npm start

name: Build Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Create release tarball
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # Write outside the tree being archived so tar doesn't try to
          # include its own growing output file ("file changed as we read it").
          TARBALL="${RUNNER_TEMP}/lp-ranger-${VERSION}.tar.gz"
          tar czf "$TARBALL" \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./tmp' \
            --exclude='./.github' \
            --exclude='./app-config/.bot-config.json' \
            --exclude='./app-config/.bot-config.backup.json' \
            --exclude='./app-config/.wallet.json' \
            --exclude='./app-config/api-keys.json' \
            --exclude='./app-config/rebalance_log.json' \
            --transform "s|^\./|lp-ranger-${VERSION}/|" \
            .
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ env.TARBALL }}
